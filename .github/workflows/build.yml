name: Build Signed Release APK

# Ce workflow compile l'application dans le cloud (gratuit) et produit
# un fichier APK téléchargeable, sans aucun outil installé sur votre PC.
#
# Il se lance automatiquement à chaque "push", et peut aussi être lancé
# manuellement depuis l'onglet "Actions" de votre dépôt GitHub
# (bouton "Run workflow").

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}   # permet le lancement manuel

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      VERSION_CODE: ${{ github.run_number }}

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calcule le nom de version d'après les tags git
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
          VERSION_NAME="${TAG#v}"
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_ENV

      - name: Générer changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            echo "CHANGELOG=Initial release" >> $GITHUB_ENV
          else
            CHANGELOG=$(git log $PREV_TAG..HEAD --pretty=format:"- %s")
            echo "CHANGELOG<<EOF" >> $GITHUB_ENV
            echo "$CHANGELOG" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Show changelog
        run: echo "${{ env.CHANGELOG }}"

      - name: Installer Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Préparer Gradle (cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Rendre gradlew exécutable
        run: chmod +x ./gradlew

      - name: Restore keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > release.jks

      - name: Créer keystore.properties
        run: |
          cat > keystore.properties <<EOF
          storeFile=my-release-key.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Compiler l'APK de debug
        run: ./gradlew assembleRelease bundleRelease --stacktrace

      # APK de debug : installable immédiatement sur le téléphone.
      - name: Publier l'APK
        uses: actions/upload-artifact@v4
        with:
          name: LocalMusic
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ env.VERSION_NAME }}
          tag_name: ${{ github.ref_name }}
          body: |
            ## Version ${{ env.VERSION_NAME }}
            
            ### Changelog
            ${{ env.CHANGELOG }}
            
            ### Build info
            - Version code: ${{ env.VERSION_CODE }}
            - Version name: ${{ env.VERSION_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}